  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

,system-ui,sans-serif}\n    a{color:inherit;text-decoration:none}\n    a:hover{color:#0f6b4f}\n    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}\n    @keyframes tickerScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;background:radial-gradient(1100px 560px at 82% -10%, rgba(15,107,79,.07), transparent 60%),#f4efe3;color:#1c2b26;display:flex;flex-direction:column\">\n\n  <header style=\"display:flex;align-items:center;justify-content:space-between;padding:26px 56px;max-width:1400px;width:100%;margin:0 auto\">\n    <div style=\"display:flex;align-items:center;gap:11px;font-family:'Space Mono',monospace\">\n      <span style=\"color:#12332a;font-weight:700;font-size:18px\">λ<\u002Fspan>\n      <span style=\"font-weight:700;letter-spacing:-.01em;font-size:17px;font-family:'Space Grotesk',sans-serif\">marketlab<\u002Fspan>\n    <\u002Fdiv>\n    <nav style=\"display:flex;align-items:center;gap:34px;font-size:14px;color:#4f5f58\">\n      <a href=\"#pitfalls\">Pitfalls<\u002Fa>\n      <a href=\"#engines\">Engines<\u002Fa>\n      <a href=\"#stack\">Stack<\u002Fa>\n      <a href=\"https://github.com/nicholasbaillargeon-ux/Market-lab\" style=\"background:#12332a;color:#f4efe3;padding:9px 18px;border-radius:8px;font-weight:600\">View on GitHub →<\u002Fa>\n    <\u002Fnav>\n  <\u002Fheader>\n\n  <main style=\"flex:1;display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.2fr);gap:56px;align-items:center;max-width:1400px;width:100%;margin:0 auto;padding:36px 56px 60px\">\n\n    <section style=\"display:flex;flex-direction:column;gap:24px\">\n      <div style=\"display:inline-flex;align-items:center;gap:9px;align-self:flex-start;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.04em;color:#12332a;border:1px solid #12332a33;padding:6px 12px;border-radius:999px\">\n        <span style=\"width:6px;height:6px;background:#12332a;border-radius:50%\"><\u002Fspan>PYTHON BACKTESTER · DUAL-ENGINE\n      <\u002Fdiv>\n      <h1 style=\"font-family:'Newsreader',serif;font-size:60px;line-height:1.0;letter-spacing:-.01em;font-weight:400;text-wrap:balance\">\n        Naive backtests lie.<br><em style=\"color:#0f6b4f\">This one won't let you.<\u002Fem>\n      <\u002Fh1>\n      <p style=\"font-size:18px;line-height:1.55;color:#4f5f58;max-width:46ch;text-wrap:pretty\">\n        A market-data pipeline and backtester organized around the six ways a backtest overstates reality — each with a mechanism and a test that fails if it regresses.\n      <\u002Fp>\n      <div style=\"display:flex;align-items:center;gap:16px;margin-top:4px\">\n        <a href=\"https://github.com/nicholasbaillargeon-ux/Market-lab\" style=\"background:#12332a;color:#f4efe3;padding:15px 26px;border-radius:8px;font-weight:600;font-size:15px\">Explore the repo →<\u002Fa>\n        <a href=\"#pitfalls\" style=\"color:#2c3b35;font-size:15px;font-weight:500;padding:15px 6px\">See the pitfalls<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:34px;margin-top:12px;font-family:'Space Mono',monospace\">\n        <div><div style=\"font-size:24px;font-weight:700;color:#1c2b26\">2<\u002Fdiv><div style=\"font-size:12px;color:#7c8a80;letter-spacing:.03em\">ENGINES, VERIFIED<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:24px;font-weight:700;color:#1c2b26\">2.2e-15<\u002Fdiv><div style=\"font-size:12px;color:#7c8a80;letter-spacing:.03em\">PARITY GAP<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:24px;font-weight:700;color:#1c2b26\">20<\u002Fdiv><div style=\"font-size:12px;color:#7c8a80;letter-spacing:.03em\">TESTS<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section>\n      <a href=\"/app/\" title=\"Open the marketlab live demo\" style=\"display:block;position:relative;border-radius:12px;overflow:hidden;border:1px solid #d8d1bf;box-shadow:0 30px 60px -30px rgba(28,43,38,.45);transition:transform .25s ease, box-shadow .25s ease\" style-hover=\"transform:translateY(-6px);box-shadow:0 44px 80px -28px rgba(28,43,38,.5), 0 0 0 1px rgba(15,107,79,.35)\">\n        <div style=\"display:flex;align-items:center;gap:8px;padding:11px 15px;background:#e7e0cf;border-bottom:1px solid #d8d1bf\">\n          <span style=\"width:11px;height:11px;border-radius:50%;background:#d98b7a\"><\u002Fspan>\n          <span style=\"width:11px;height:11px;border-radius:50%;background:#d9b46a\"><\u002Fspan>\n          <span style=\"width:11px;height:11px;border-radius:50%;background:#7aa889\"><\u002Fspan>\n          <span style=\"margin-left:12px;font-family:'Space Mono',monospace;font-size:12px;color:#7c8a80\">bash — make demo<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"background:#fbf8f0;padding:22px 24px;font-family:'Space Mono',monospace;font-size:13px;line-height:1.85;min-height:340px\">\n          <div><span style=\"color:#0f6b4f\">$<\u002Fspan> <span style=\"color:#1c2b26\">make demo<\u002Fspan>&nbsp;&nbsp;<span style=\"color:#9aa89e\"># real SPY data, no API key<\u002Fspan><\u002Fdiv>\n          <div style=\"height:12px\"><\u002Fdiv>\n          <div style=\"color:#7c8a80\">== 1. Engine parity (zero cost) ==<\u002Fdiv>\n          <div style=\"color:#2c3b35\">vectorized&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;+198.7%&nbsp;&nbsp;&nbsp;0.64&nbsp;&nbsp;&nbsp;-33.7%<\u002Fdiv>\n          <div style=\"color:#2c3b35\">event_driven&nbsp;&nbsp;&nbsp;+198.7%&nbsp;&nbsp;&nbsp;0.64&nbsp;&nbsp;&nbsp;-33.7%<\u002Fdiv>\n          <div style=\"color:#0f6b4f\">&nbsp;&nbsp;-&gt; terminal-return gap: 2.22e-15 &nbsp;(engines agree)<\u002Fdiv>\n          <div style=\"height:14px\"><\u002Fdiv>\n          <div style=\"color:#7c8a80\">== 2. Look-ahead bias (dishonest fill) ==<\u002Fdiv>\n          <div style=\"color:#2c3b35\">honest (next open)&nbsp;&nbsp;&nbsp;&nbsp;+198.7%<\u002Fdiv>\n          <div style=\"color:#b07a20\">look-ahead (same close) +217.9%<\u002Fdiv>\n          <div style=\"color:#c0503a\">&nbsp;&nbsp;-&gt; inflates return by +19.2% of pure fantasy<\u002Fdiv>\n          <div style=\"height:14px\"><\u002Fdiv>\n          <div><span style=\"color:#0f6b4f\">$<\u002Fspan> <span style=\"display:inline-block;width:9px;height:16px;background:#0f6b4f;vertical-align:-3px;animation:blink 1.1s step-end infinite\"><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;padding-bottom:26px;pointer-events:none\">\n          <div style=\"display:flex;align-items:center;gap:10px;background:rgba(244,239,227,.85);backdrop-filter:blur(6px);border:1px solid rgba(15,107,79,.4);color:#0f6b4f;padding:12px 22px;border-radius:999px;font-weight:600;font-size:15px;font-family:'Space Grotesk',sans-serif;box-shadow:0 8px 30px rgba(28,43,38,.18)\">\n            ▶ Click to open the live demo\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fa>\n      <p style=\"text-align:center;font-family:'Space Mono',monospace;font-size:12px;color:#7c8a80;margin-top:14px\">Runs locally · <span style=\"color:#0f6b4f\">make install &amp;&amp; make demo<\u002Fspan><\u002Fp>\n    <\u002Fsection>\n  <\u002Fmain>\n\n  <div style=\"overflow:hidden;border-top:1px solid #e2dccb;border-bottom:1px solid #e2dccb;background:#ede7d8;padding:13px 0\">\n    <div style=\"display:flex;gap:44px;width:max-content;animation:tickerScroll 30s linear infinite;font-family:'Space Mono',monospace;font-size:13px;color:#5f6f68\">\n      <sc-for list=\"{{ tickerLoop }}\" as=\"t\" hint-placeholder-count=\"12\">\n        <span style=\"display:inline-flex;gap:10px\"><span style=\"color:#0f6b4f\">✓<\u002Fspan><span>{{ t }}<\u002Fspan><\u002Fspan>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <section id=\"pitfalls\" style=\"max-width:1400px;width:100%;margin:0 auto;padding:80px 56px 30px\">\n    <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.14em;color:#0f6b4f;margin-bottom:14px\">THE WHOLE POINT<\u002Fdiv>\n    <h2 style=\"font-family:'Newsreader',serif;font-size:40px;letter-spacing:-.01em;font-weight:400;margin-bottom:12px\">Six ways a backtest fools you<\u002Fh2>\n    <p style=\"color:#4f5f58;font-size:16px;margin-bottom:44px;max-width:60ch\">Each pitfall has a concrete mechanism in the engine and a test that fails if the mechanism regresses.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:22px\">\n      <sc-for list=\"{{ pitfalls }}\" as=\"p\" hint-placeholder-count=\"6\">\n        <div style=\"background:#ece5d5;border:1px solid #dcd4c2;border-radius:14px;padding:26px;display:flex;flex-direction:column;gap:11px\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#0f6b4f\">{{ p.tag }}<\u002Fdiv>\n          <div style=\"font-size:18px;font-weight:600;letter-spacing:-.01em\">{{ p.title }}<\u002Fdiv>\n          <div style=\"font-size:14.5px;line-height:1.55;color:#4f5f58;text-wrap:pretty\">{{ p.body }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"engines\" style=\"max-width:1400px;width:100%;margin:0 auto;padding:44px 56px 20px\">\n    <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.14em;color:#0f6b4f;margin-bottom:14px\">TWO ENGINES, ONE MODEL<\u002Fdiv>\n    <h2 style=\"font-family:'Newsreader',serif;font-size:40px;letter-spacing:-.01em;font-weight:400;margin-bottom:36px\">Fast for research, exact for reality<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px\">\n      <sc-for list=\"{{ engines }}\" as=\"e\" hint-placeholder-count=\"2\">\n        <div style=\"background:#ece5d5;border:1px solid #dcd4c2;border-radius:14px;padding:28px;display:flex;flex-direction:column;gap:14px\">\n          <div style=\"display:flex;align-items:baseline;justify-content:space-between\">\n            <div style=\"font-size:20px;font-weight:700;font-family:'Space Mono',monospace;color:#1c2b26\">{{ e.name }}<\u002Fdiv>\n            <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#0f6b4f\">{{ e.speed }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:15px;line-height:1.6;color:#4f5f58;text-wrap:pretty\">{{ e.body }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"stack\" style=\"max-width:1400px;width:100%;margin:0 auto;padding:40px 56px 90px\">\n    <div style=\"display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-family:'Space Mono',monospace;font-size:13px;color:#4f5f58\">\n      <span style=\"color:#8a9890\">BUILT WITH<\u002Fspan>\n      <sc-for list=\"{{ stack }}\" as=\"s\" hint-placeholder-count=\"6\">\n        <span style=\"border:1px solid #d8d1bf;border-radius:7px;padding:7px 13px;color:#2c3b35;background:#ece5d5\">{{ s }}<\u002Fspan>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"border-top:1px solid #e2dccb;padding:24px 56px;max-width:1400px;width:100%;margin:0 auto;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#8a9890\">\n    <span>© 2026 marketlab · A research tool. Net returns are the business — not investment advice.<\u002Fspan>\n    <a href=\"https://github.com/nicholasbaillargeon-ux/Market-lab\" style=\"color:#5f6f68\">github.com/nicholasbaillargeon-ux<\u002Fa>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    const ticks = [\n      \"engine parity 1e-9\",\"look-ahead guarded\",\"survivorship-aware universe\",\n      \"split/dividend consistent\",\"costs modeled\",\"next-open fills\",\"20 tests green\",\n      \"Parquet lake\",\"Postgres system of record\",\n    ];\n    return {\n      tickerLoop: [...ticks, ...ticks],\n      pitfalls: [\n        {tag:\"01 · LOOK-AHEAD\", title:\"Information you couldn't have had\", body:\"Decide at close t, fill at open t+1 — a structural rule. Tests perturb future bars and assert past P&L is byte-identical.\"},\n        {tag:\"02 · SURVIVORSHIP\", title:\"Only backtesting the winners\", body:\"A point-in-time symbol table with listed/delisted dates. universe_asof(date) returns the universe as it existed then — dead names included.\"},\n        {tag:\"03 · ADJUSTMENT\", title:\"The split that never crashed\", body:\"Every bar carries both close and adj_close. P&L runs on returns (adjustment-invariant); level signals use raw prices — each choice explicit.\"},\n        {tag:\"04 · COSTS\", title:\"The strategy that works for free\", body:\"Proportional and non-proportional cost models with zero / retail / institutional presets. Gross returns are a fantasy; net is the business.\"},\n        {tag:\"05 · SLIPPAGE\", title:\"You are not the only trader\", body:\"A symmetric half-spread penalty at the next open. The event engine tracks real cash and shares, so fees and fractional effects are exact.\"},\n        {tag:\"06 · OVERFITTING\", title:\"The research-vs-reality gap\", body:\"Two independent engines. Where they disagree is where a shortcut snuck in — so 'did my fast backtest cheat?' becomes a unit test.\"},\n      ],\n      engines: [\n        {name:\"vectorized\", speed:\"FAST\", body:\"numpy whole-array, overnight/intraday return decomposition, proportional costs. Built for research sweeps and rapid iteration.\"},\n        {name:\"event_driven\", speed:\"EXACT\", body:\"Bar-by-bar loop with explicit cash and shares, per-share and fixed costs. The number you'd actually trade.\"},\n      ],\n      stack: [\"Python\",\"numpy\",\"pandas\",\"Parquet\",\"Postgres 16\",\"Polygon.io / yfinance\",\"uv\",\"Docker\"],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
